<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} – {{ site.title }}</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      font-family: sans-serif;
      color: #eee;
    }
    header {
      padding: 2rem;
      text-align: center;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #39ff14;
    }
    .masonry {
      columns: 3 280px;
      column-gap: 0.75rem;
      padding: 1rem 2rem 4rem;
    }
    .masonry img {
      width: 100%;
      display: block;
      margin-bottom: 0.75rem;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .masonry img:hover {
      opacity: 0.85;
      transform: scale(1.02);
    }
    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.active {
      display: flex;
    }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(57,255,20,0.2);
    }
    #lightbox-close {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      font-size: 2rem;
      cursor: pointer;
      color: #fff;
      line-height: 1;
    }
    #lightbox-prev, #lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      cursor: pointer;
      color: #fff;
      user-select: none;
      padding: 0.5rem 1rem;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
    }
    #lightbox-prev { left: 1rem; }
    #lightbox-next { right: 1rem; }
  </style>
</head>
<body>

<header>{{ page.title }}</header>

<div class="masonry" id="gallery">
  <img src="/assets/design/img1.jpg" alt="Work 1">
  <img src="/assets/design/img2.jpg" alt="Work 2">
  <img src="/assets/design/img3.jpg" alt="Work 3">
  <img src="/assets/design/img4.jpg" alt="Work 4">
  <img src="/assets/design/img5.jpg" alt="Work 5">
  <img src="/assets/design/img6.jpg" alt="Work 6">
  <img src="/assets/design/img7.jpg" alt="Work 7">
  <img src="/assets/design/img8.jpg" alt="Work 8">
  <img src="/assets/design/img9.jpg" alt="Work 9">
  <img src="/assets/design/img10.jpg" alt="Work 10">
  <img src="/assets/design/img11.jpg" alt="Work 11">
  <img src="/assets/design/img12.jpg" alt="Work 12">
  <img src="/assets/design/img13.jpg" alt="Work 13">
  <img src="/assets/design/img14.jpg" alt="Work 14">
  <img src="/assets/design/img15.jpg" alt="Work 15">
  <img src="/assets/design/img16.jpg" alt="Work 16">
  <!-- Añade aquí las 33 imágenes con sus nombres reales -->
</div>

<!-- Lightbox -->
<div id="lightbox">
  <span id="lightbox-close">✕</span>
  <span id="lightbox-prev">‹</span>
  <img id="lightbox-img" src="" alt="">
  <span id="lightbox-next">›</span>
</div>

<script>
  const imgs = Array.from(document.querySelectorAll('.masonry img'));
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  let current = 0;

  function open(i) {
    current = i;
    lbImg.src = imgs[i].src;
    lb.classList.add('active');
  }
  function close() { lb.classList.remove('active'); }
  function prev() { open((current - 1 + imgs.length) % imgs.length); }
  function next() { open((current + 1) % imgs.length); }

  imgs.forEach((img, i) => img.addEventListener('click', () => open(i)));
  document.getElementById('lightbox-close').addEventListener('click', close);
  document.getElementById('lightbox-prev').addEventListener('click', prev);
  document.getElementById('lightbox-next').addEventListener('click', next);
  lb.addEventListener('click', e => { if (e.target === lb) close(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'ArrowRight') next();
  });
</script>

</body>
</html>
