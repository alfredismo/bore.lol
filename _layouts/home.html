---
layout: default
---

<style>
  .post-list li { margin-bottom: 2rem; list-style: none; }
  .post-list a {
    color: #eee;
    text-decoration: none;
    font-size: 1.2rem;
    transition: color 0.2s ease;
  }
  .post-list a:hover { color: #39ff14; }
  .post-meta { color: #555; font-size: 0.85rem; margin-top: 0.3rem; }
</style>

<h1 class="page-heading" style="color:#39ff14;">Blog</h1>

<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <a href="{{ post.url }}">{{ post.title }}</a>
    <p class="post-meta">{{ post.date | date: "%d %b %Y" }}</p>
  </li>
  {% endfor %}
</ul>
