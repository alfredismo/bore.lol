<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bore.lol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Pixelify+Sans:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            padding: 36px 44px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* LOGO */
        .logo a {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5.5rem;
            font-weight: 700;
            color: #00ff00;
            text-decoration: none;
            line-height: 1;
            display: block;
            margin-bottom: 18px;
        }

        /* MENÚ VERTICAL GRANDE */
        nav {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 40px;
        }

        nav a {
            font-family: 'Pixelify Sans', sans-serif;
            font-size: 1.6rem;
            color: #ccc;
            text-decoration: none;
            transition: color 0.15s;
            line-height: 1.4;
        }

        nav a:hover { color: #00ff00; }

        /* CONTENIDO */
        .content {
            max-width: 680px;
            flex: 1;
        }

        /* TÍTULOS EN POSTS */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            color: #00ff00;
            margin-bottom: 8px;
        }

        h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
            color: #00ff00;
            margin: 24px 0 10px;
        }

        /* CUERPO DE TEXTO */
        p, li, blockquote {
            font-family: 'Lora', serif;
            font-size: 1.05rem;
            color: #ddd;
            line-height: 1.85;
            margin-bottom: 16px;
        }

        blockquote {
            border-left: 3px solid #00ff00;
            padding-left: 16px;
            color: #aaa;
            font-style: italic;
        }

        /* CÓDIGO */
        code, pre {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9rem;
        }

        /* LINKS */
        a { color: #00ff00; }
        a:hover { text-decoration: underline; }

        /* FECHA EN POSTS */
        .post-date {
            font-family: 'Pixelify Sans', sans-serif;
            color: #444;
            font-size: 0.9rem;
            margin-bottom: 18px;
            display: block;
        }

        /* FOOTER */
        footer {
            margin-top: 60px;
            color: #333;
            font-size: 0.75rem;
            font-family: 'Pixelify Sans', sans-serif;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="logo"><a href="/">bore</a></div>

    <nav>
        <a href="/">Inicio</a>
        <a href="/about">About</a>
        <a href="/posts">Blog</a>
        <a href="https://x.com/boreuno">X</a>
        <a href="https://instagram.com/boreuno">Instagram</a>
        <a href="https://puromexa.tumblr.com">Meme Museum</a>
        <a href="/music">Music</a>
        <a href="/design">Design</a>
    </nav>

    <div class="content">
        {{ content }}
    </div>

    <footer>Memeism. — bore.lol</footer>
</body>
</html>
