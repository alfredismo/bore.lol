<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bore.lol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jacquarda+Bastarda+9&family=Special+Gothic+Expanded+One&family=Oswald:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wrapper {
            width: 100%;
            max-width: 680px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* LOGO */
        .logo a {
            font-family: 'Jacquarda Bastarda 9', serif;
            font-size: 5.5rem;
            color: #00ff00;
            text-decoration: none;
            line-height: 1;
            display: block;
            margin-bottom: 20px;
        }

        /* MENÚ VERTICAL */
        nav {
            display: flex;
            flex-direction: column;
            gap: 1px;
            margin-bottom: 40px;
        }

        nav a {
            font-family: 'Special Gothic Expanded One', sans-serif;
            font-size: 1.4rem;
            color: #ccc;
            text-decoration: none;
            line-height: 1.35;
            transition: color 0.15s;
        }

        nav a:hover { color: #00ff00; }

        /* CONTENIDO */
        .content {
            width: 100%;
            flex: 1;
        }

        /* TÍTULO DE POST */
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.4rem;
            font-weight: 600;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            line-height: 1.1;
        }

        h2, h3 {
            font-family: 'Oswald', sans-serif;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 28px 0 10px;
        }

        /* CUERPO DE POST */
        p, li {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            color: #ddd;
            line-height: 1.9;
            margin-bottom: 18px;
        }

        blockquote {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #aaa;
            border-left: 3px solid #00ff00;
            padding-left: 18px;
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        /* FECHA */
        .post-date {
            font-family: 'Special Gothic Expanded One', sans-serif;
            color: #444;
            font-size: 0.8rem;
            margin-bottom: 30px;
            display: block;
            letter-spacing: 1px;
        }

        /* CÓDIGO */
        code, pre {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 2px 7px;
            border-radius: 3px;
            font-size: 0.88rem;
        }

        a { color: #00ff00; }
        a:hover { text-decoration: underline; }

        /* FOOTER */
        footer {
            margin-top: 60px;
            color: #333;
            font-size: 0.75rem;
            font-family: 'Special Gothic Expanded One', sans-serif;
            letter-spacing: 2px;
            text-align: center;
            padding-bottom: 20px;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .logo a { font-size: 4rem; }
            nav a { font-size: 1.2rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="logo"><a href="/">bore</a></div>

        <nav>
            <a href="/">Inicio</a>
            <a href="/about">About</a>
            <a href="/blog">Blog</a>
            <a href="https://x.com/TU_USUARIO">X</a>
            <a href="https://instagram.com/TU_USUARIO">Instagram</a>
            <a href="/meme-museum">Meme Museum</a>
            <a href="/music">Music</a>
            <a href="/design">Design</a>
        </nav>

        <div class="content">
            {{ content }}
        </div>

        <footer>Memeism. — bore.lol</footer>
    </div>
</body>
</html>
