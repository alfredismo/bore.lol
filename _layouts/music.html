<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} – {{ site.title }}</title>
  <style>
    body { margin:0; background:#0a0a0a; font-family:sans-serif; color:#eee; }
    header {
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1a1a1a;
    }
    header nav { display:flex; gap:2rem; }
    header nav a {
      color:#aaa; text-decoration:none;
      font-size:0.85rem; letter-spacing:0.15em;
      text-transform:uppercase; transition:color 0.2s;
    }
    header nav a:hover { color:#39ff14; }
    .masonry-music {
      columns: 3 300px;
      column-gap: 1rem;
      padding: 2rem 2rem 4rem;
    }
    .release {
      break-inside: avoid;
      margin-bottom: 1rem;
      border-radius: 4px;
      overflow: hidden;
      background: #111;
    }
    .release iframe { width:100%; display:block; border:none; }
  </style>
</head>
<body>

<header>
  <a href="/" style="text-decoration:none;">
    <span style="color:#39ff14;letter-spacing:0.3em;font-size:1.6rem;font-weight:bold;">BORE</span>
  </a>
  <nav>
    <a href="/">Home</a>
    <a href="/design/">Design</a>
    <a href="/music/">Music</a>
  </nav>
</header>

<div class="masonry-music">

  <!-- BANDCAMP — djchedraui -->
  <div class="release">
    <iframe style="border:0;height:340px;"
      src="https://bandcamp.com/EmbeddedPlayer/artist=djchedraui/size=large/bgcol=111111/linkcol=39ff14/artwork=small/transparent=true/"
      seamless>
    </iframe>
  </div>

  <!-- SOUNDCLOUD — djchedraui -->
  <div class="release">
    <iframe height="450" scrolling="no" allow="autoplay"
      src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/djchedraui&color=%2339ff14&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&visual=true">
    </iframe>
  </div>

  <!-- Añade más releases aquí -->

</div>
</body>
</html>
