<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} – {{ site.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Jacquard+12&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #0a0a0a; font-family: sans-serif; color: #eee; }
    .site-header { padding: 1.5rem 2rem 0.5rem; text-align: center; }
    .site-header a {
      font-family: 'Jacquard 12', cursive;
      font-size: 2.2rem;
      color: #39ff14;
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: opacity 0.2s;
    }
    .site-header a:hover { opacity: 0.7; }
    header.page-title { padding: 0.5rem 2rem 1.5rem; text-align: center; font-size: 1rem; letter-spacing: 0.3em; text-transform: uppercase; color: #666; }
    .masonry-music { columns: 3 300px; column-gap: 1rem; padding: 0 2rem 4rem; }
    .release { break-inside: avoid; margin-bottom: 1rem; border-radius: 4px; overflow: hidden; background: #111; }
    .release iframe { width: 100%; display: block; border: none; }
  </style>
</head>
<body>

<div class="site-header">
  <a href="/">BORE</a>
</div>
<header class="page-title">Music</header>

<div class="masonry-music">

  <!-- BANDCAMP — pega aquí cada embed de djchedraui.bandcamp.com -->
  <div class="release">
    <iframe style="border:0;height:340px;"
      src="https://bandcamp.com/EmbeddedPlayer/album=TUNUMERO/size=large/bgcol=111111/linkcol=39ff14/artwork=small/transparent=true/"
      seamless>
    </iframe>
  </div>

  <!-- SOUNDCLOUD — pega aquí cada embed de soundcloud.com/djchedraui -->
  <div class="release">
    <iframe height="300" scrolling="no" allow="autoplay"
      src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/djchedraui&color=%2339ff14&auto_play=false&hide_related=true&show_comments=false&show_user=true&visual=true">
    </iframe>
  </div>

  <!-- Añade más releases alternando Bandcamp y SoundCloud -->

</div>
</body>
</html>
