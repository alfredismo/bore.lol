<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} – {{ site.title }}</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      font-family: sans-serif;
      color: #eee;
    }
    header {
      padding: 2rem;
      text-align: center;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #39ff14;
    }
    .masonry-music {
      columns: 3 300px;
      column-gap: 1rem;
      padding: 1rem 2rem 4rem;
    }
    .release {
      break-inside: avoid;
      margin-bottom: 1rem;
      border-radius: 4px;
      overflow: hidden;
      background: #111;
    }
    .release iframe {
      width: 100%;
      display: block;
      border: none;
    }
  </style>
</head>
<body>

<header>{{ page.title }}</header>

<div class="masonry-music">

  <!-- BANDCAMP — reemplaza el src con tu embed real -->
  <div class="release">
    <iframe style="border: 0; height: 340px;"
      src="https://bandcamp.com/EmbeddedPlayer/album=TUNUMERO/size=large/bgcol=111111/linkcol=39ff14/artwork=small/transparent=true/"
      seamless>
    </iframe>
  </div>

  <!-- SOUNDCLOUD — reemplaza el url con tu track/playlist real -->
  <div class="release">
    <iframe height="300"
      scrolling="no"
      src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/TUUSUARIO/TUTRACK&color=%2339ff14&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&visual=true"
      allow="autoplay">
    </iframe>
  </div>

  <!-- Añade más releases aquí, alternando Bandcamp y SoundCloud -->

</div>

</body>
</html>
